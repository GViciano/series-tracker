<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1e2c"/>
      <stop offset="100%" stop-color="#10121b"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2c469"/>
      <stop offset="100%" stop-color="#e8b23f"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#333a5c"/>
      <stop offset="55%" stop-color="#1c1f30"/>
      <stop offset="100%" stop-color="#12141c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#f2b84c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f2b84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- fondo -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- antena -->
  <g stroke="#4a5070" stroke-width="10" stroke-linecap="round">
    <line x1="256" y1="182" x2="172" y2="66"/>
    <line x1="256" y1="182" x2="340" y2="66"/>
  </g>
  <circle cx="172" cy="66" r="12" fill="#f2b84c"/>
  <circle cx="340" cy="66" r="12" fill="#f2b84c"/>

  <!-- patas -->
  <rect x="158" y="414" width="30" height="38" rx="8" fill="#5c4326"/>
  <rect x="324" y="414" width="30" height="38" rx="8" fill="#5c4326"/>

  <!-- cuerpo del televisor -->
  <rect x="96" y="172" width="320" height="248" rx="36" fill="url(#body)" stroke="#b8862a" stroke-width="6"/>

  <!-- pantalla -->
  <rect x="128" y="202" width="212" height="152" rx="18" fill="url(#screen)"/>
  <rect x="128" y="202" width="212" height="152" rx="18" fill="url(#glow)"/>

  <!-- lineas de escaneo -->
  <g stroke="#f2b84c" stroke-opacity="0.12" stroke-width="3">
    <line x1="128" y1="228" x2="340" y2="228"/>
    <line x1="128" y1="254" x2="340" y2="254"/>
    <line x1="128" y1="280" x2="340" y2="280"/>
    <line x1="128" y1="306" x2="340" y2="306"/>
    <line x1="128" y1="332" x2="340" y2="332"/>
  </g>

  <!-- triangulo de play -->
  <path d="M216 246 L216 310 L272 278 Z" fill="#f2b84c"/>

  <!-- panel de control -->
  <circle cx="374" cy="240" r="16" fill="#2a2f47" stroke="#b8862a" stroke-width="4"/>
  <circle cx="374" cy="240" r="5" fill="#f2b84c"/>
  <circle cx="374" cy="288" r="16" fill="#2a2f47" stroke="#b8862a" stroke-width="4"/>
  <circle cx="374" cy="288" r="5" fill="#f2b84c"/>

  <!-- rejilla altavoz -->
  <g stroke="#b8862a" stroke-width="5" stroke-linecap="round" stroke-opacity="0.7">
    <line x1="362" y1="330" x2="386" y2="330"/>
    <line x1="358" y1="344" x2="390" y2="344"/>
  </g>
</svg>
